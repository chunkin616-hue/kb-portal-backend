name: CD

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat
          - production

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      deployed: ${{ steps.deploy_marker.outputs.deployed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build/Verify application
        run: |
          python -m py_compile app.py schema.py

      - name: Create deployment marker
        id: deploy_marker
        run: |
          DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          ENVIRONMENT=${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'uat' }}
          
          echo "### Backend Deployment Info" > deployment-info.md
          echo "**Environment:** $ENVIRONMENT" >> deployment-info.md
          echo "**Deployed at:** $DEPLOY_TIME" >> deployment-info.md
          echo "**Commit:** ${{ github.sha }}" >> deployment-info.md
          echo "**Branch:** ${{ github.ref }}" >> deployment-info.md
          echo "**Runner:** ${{ runner.os }}" >> deployment-info.md
          echo "**Port:** 5003" >> deployment-info.md
          
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Commit deployment info
        run: |
          git config user.name "CI/CD"
          git config user.email "ci@afe.com"
          git add deployment-info.md
          git commit -m "Deploy Backend: ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: Deploy to UAT
        if: (github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'uat') && github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "Deploying to UAT environment"
          # Add deployment commands here
          # Example: rsync or scp to UAT server
          # echo "$DEPLOY_KEY" > deploy_key && chmod 600 deploy_key
          # scp -i deploy_key -r . $DEPLOY_USER@$DEPLOY_HOST:/path/to/uat

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "Deploying to Production environment"
          # Add deployment commands here
          # Example: rsync or scp to production server
