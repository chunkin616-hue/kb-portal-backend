name: CD

on:
  push:
    branches:
      - main
      - develop
      - uat
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'uat'
        type: choice
        options:
          - uat
          - production

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/uat'
    outputs:
      deployed: ${{ steps.deploy_marker.outputs.deployed }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'uat' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build/Verify application
        run: |
          python -m py_compile app.py schema.py

      - name: Set deployment port
        run: |
          case ${{ env.ENVIRONMENT }} in
            uat)
              echo "DEPLOY_PORT=5004" >> $GITHUB_ENV
              ;;
            production)
              echo "DEPLOY_PORT=5005" >> $GITHUB_ENV
              ;;
            *)
              echo "DEPLOY_PORT=5003" >> $GITHUB_ENV
              ;;
          esac

      - name: Create deployment marker
        id: deploy_marker
        run: |
          DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          echo "### Backend Deployment Info" > deployment-info.md
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> deployment-info.md
          echo "**Deployed at:** $DEPLOY_TIME" >> deployment-info.md
          echo "**Commit:** ${{ github.sha }}" >> deployment-info.md
          echo "**Branch:** ${{ github.ref }}" >> deployment-info.md
          echo "**Runner:** ${{ runner.os }}" >> deployment-info.md
          echo "**Port:** ${{ env.DEPLOY_PORT }}" >> deployment-info.md
          
          echo "deployed=true" >> $GITHUB_OUTPUT

      - name: Commit deployment info
        run: |
          git config user.name "CI/CD"
          git config user.email "ci@afe.com"
          git add deployment-info.md
          git commit -m "Deploy Backend: ${{ github.sha }}" || echo "No changes to commit"
          git push

      - name: Deploy to UAT
        if: (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/uat' || github.event.inputs.environment == 'uat') && github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "Deploying to UAT environment (port 5004)"
          echo "$DEPLOY_KEY" > deploy_key && chmod 600 deploy_key
          
          # Copy backend files
          scp -i deploy_key *.py *.txt *.md requirements.txt $DEPLOY_USER@$DEPLOY_HOST:/opt/kb-portal-backend/
          scp -i deploy_key -r templates $DEPLOY_USER@$DEPLOY_HOST:/opt/kb-portal-backend/
          
          # Restart PM2 with correct environment
          ssh -i deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd /opt/kb-portal-backend && pm2 restart kb-backend-uat --env production"
          
          rm -f deploy_key

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          echo "Deploying to Production environment (port 5005)"
          echo "$DEPLOY_KEY" > deploy_key && chmod 600 deploy_key
          
          # Copy backend files
          scp -i deploy_key *.py *.txt *.md requirements.txt $DEPLOY_USER@$DEPLOY_HOST:/opt/kb-portal-backend/
          scp -i deploy_key -r templates $DEPLOY_USER@$DEPLOY_HOST:/opt/kb-portal-backend/
          
          # Restart PM2 with correct environment
          ssh -i deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd /opt/kb-portal-backend && pm2 restart kb-backend-prod --env production"
          
          rm -f deploy_key
