name: Deploy Backend to PROD

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://192.168.140.149:5005
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify syntax
        run: |
          python -m py_compile app.py schema.py

      - name: Deploy to PROD via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/kb-portal-backend
            git pull origin prod
            pip install -r requirements.txt
            pm2 restart kb-backend-prod || pm2 start python --name kb-backend-prod -- app.py
            pm2 save

      - name: Health Check PROD
        run: |
          sleep 10
          curl -f http://192.168.140.149:5005/health || curl -f http://192.168.140.149:5005 || echo "Health check endpoint may not be configured"
